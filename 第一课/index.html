        q_count:'ж•°дёҖж•°пјҢдёӢйқўжңүеҮ дёӘж°”зҗғе‘Җпј?,q_compare:'е“Әиҫ№жӣҙеӨҡе‘ҖпјҹзӮ№зӮ№еӨҡзҡ„йӮЈиҫ?,
        q_compare_fewer:'е“Әиҫ№жӣҙе°‘е‘ҖпјҹзӮ№зӮ№е°‘зҡ„йӮЈиҫ?,q_len_long:'е“ӘжқЎжӣҙй•ҝе‘ҖпјҹзӮ№зӮ№й•ҝзҡ„йӮЈжқ?,
        q_len_short:'е“ӘжқЎжӣҙзҹӯе‘ҖпјҹзӮ№зӮ№зҹӯзҡ„йӮЈжқ?,q_sort:'жүҫеҮәдёҚдёҖж ·зҡ„йӮЈдёӘе“?,
        q_pos:'зңӢдёҖзңӢпјҢе“ӘдёӘеңЁдёҠйқўе‘Җпј?,q_pos2:'зңӢдёҖзңӢпјҢе“ӘдёӘеңЁе·Ұиҫ№е‘Җпј?,
        q_pos_bottom:'зңӢдёҖзңӢпјҢе“ӘдёӘеңЁдёӢйқўе‘Җпј?,q_pos_right:'зңӢдёҖзңӢпјҢе“ӘдёӘеңЁеҸіиҫ№е‘Җпј?,
    },

    _getCtx() {
        if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this._ctx.state === 'suspended') this._ctx.resume();
        return this._ctx;
    },

    // жҠ?mp3 д»ҺжңҚеҠЎеҷЁжӢүдёӢжқҘе№¶и§Јз ҒжҲ?AudioBuffer
    async _load(id) {
        if (this._bufCache[id]) return this._bufCache[id];
        const ctx = this._getCtx();
        const resp = await fetch(this._base + id + '.mp3');
        const buf = await resp.arrayBuffer();
        const audioBuf = await ctx.decodeAudioData(buf);
        this._bufCache[id] = audioBuf;
        return audioBuf;
    },

    // дёҚзӯүеҫ…еҠ иҪҪпјҢеҗҺеҸ°йў„иҪҪпјҲз”Ёдә?initпј?    _preload(id) {
        fetch(this._base + id + '.mp3').then(r => r.arrayBuffer()).then(b => {
            if (!this._bufCache[id] && this._ctx) {
                this._ctx.decodeAudioData(b).then(ab => { this._bufCache[id] = ab; }).catch(()=>{});
            }
        }).catch(()=>{});
    },

    // ========== еҲқе§ӢеҢ–пјҡеҗҺеҸ°ејҖе§Ӣйў„дёӢиҪҪжүҖжң?mp3 ==========
    init() {
        Object.keys(this._clips).forEach(id => this._preload(id));
    },

    // еҒңжӯўжүҖжңүжӯЈеңЁж’ӯж”ҫзҡ„иҜӯйҹіпјҲдёҚе…ій—ӯ AudioContextпјҢдҝқжҢҒи§Јй”ҒзҠ¶жҖҒпјү
    stopAll() {
        try { if (this._currentSrc) { this._currentSrc.stop(); this._currentSrc = null; } } catch(e) {}
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    },

    // ========== ж’ӯж”ҫжҢҮе®ҡзүҮж®өпјҲз”Ё AudioContext ж’ӯпјҢжүӢжңәе…је®№пј?==========
    _currentSrc: null,  // жӯЈеңЁж’ӯзҡ„ source еј•з”Ё
    play(id) {
        this.stopAll();
        const ctx = this._getCtx();
        const buf = this._bufCache[id];
        if (buf) {
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
            this._currentSrc = src;
            return this._promiseSource(src);
        }
        // иҝҳжІЎеҠ иҪҪе®?вҶ?зӣҙжҺҘеҠ иҪҪеҶҚж’ӯ
        return this._load(id).then(buf => this.play(id));
    },

    // иҝ”еӣһ promiseпјҢsource ж’ӯе®ҢжҲ–и¶…ж—¶пјҲ5з§’пјүж—?resolve
    _promiseSource(src) {
        let done = false, resolve;
        const ok = () => { if (!done) { done = true; if (resolve) resolve(); } };
        return new Promise(r => { resolve = r; src.onended = ok; setTimeout(ok, 5000); });
    },

    // ========== жң—иҜ»ж–Үеӯ—пјҲйўҳзӣ®з”ЁвҖ”вҖ”еҠЁжҖҒеҶ…е®№иө° TTSпј?==========
    speak(text) {
        if (!text || text.trim() === '') return;
        const clean = text.replace(/[\u{1F600}-\u{1F9FF}\u{2600}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{200D}\u{FE0F}]/gu, '').replace(/\s+/g, ' ').trim();
        if (!clean) return;
        this._lastText = clean;
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(clean);
        u.lang='zh-CN'; u.rate=0.9; u.pitch=1.2; u.volume=1;
        const voices = window.speechSynthesis.getVoices();
        const zh = voices.find(v => /huihui|female|girl|yaoyao/i.test(v.name) && v.lang.startsWith('zh')) || voices.find(v => v.lang.startsWith('zh'));
        if (zh) u.voice = zh;
        window.speechSynthesis.speak(u);
    },

    // ========== зӯ”еҜ№ вҶ?йҡҸжңәеӨёеҘ– ==========
    praise(onDone) {
        const n = Math.floor(Math.random()*8)+1;
        const txt = this._clips['p'+n] || '';
        this.play('p'+n).then(() => { if (onDone) onDone(txt); }).catch(() => { if (onDone) setTimeout(() => onDone(txt), 500); });
    },

    // ========== зӯ”й”ҷ вҶ?й“ҫејҸж’ӯж”ҫ ==========
    correctHint(correctAns, onDone) {
        const wi = Math.floor(Math.random()*3)+1, ei = Math.floor(Math.random()*3)+1;
        const aW = 'w'+wi, aE = 'e'+ei;
        const ansId = this._ansToId(correctAns);
        const chain = [aW, ansId, aE].filter(Boolean);
        const done = () => { if (onDone) onDone(); };
        const playChain = (idx) => {
            if (idx >= chain.length) { done(); return; }
            this.play(chain[idx]).then(() => playChain(idx+1)).catch(() => playChain(idx+1));
        };
        if (chain.length) playChain(0);
        else done();
    },

    // зӯ”жЎҲж–Үжң¬ вҶ?mp3 зј–еҸ·жҳ е°„
    _ansToId(ans) {
        const s = String(ans).trim();
        if (/^\d+$/.test(s) && +s >= 3 && +s <= 20) return 'n'+s;
        const dirMap = { 'дёҠйқў':'d_top','дёӢйқў':'d_bottom','е·Ұиҫ№':'d_left','еҸіиҫ№':'d_right','жӣҙеӨҡ':'d_more','жӣҙе°‘':'d_fewer','жӣҙй•ҝ':'d_long','жӣҙзҹӯ':'d_short','е·Ұиҫ№жӣҙеӨҡ':'d_left','еҸіиҫ№жӣҙеӨҡ':'d_right','дёҠйқўйӮЈжқЎ':'d_top','дёӢйқўйӮЈжқЎ':'d_bottom' };
        for (const [k,v] of Object.entries(dirMap)) { if (s.includes(k)) return v; }
        const nameMap = { 'е°Ҹйёҹ':'s_bird','е°Ҹйұј':'s_fish','е°ҸзҢ«':'s_cat','е°ҸзӢ—':'s_dog' };
        if (nameMap[s]) return nameMap[s];
        return null;
    },

    // йҮҚж–°иҜ»йўҳ
    replay() {
        const rd = Game.rounds[Game.curIdx];
        if (rd && rd.voice) this.play(rd.voice);
        else if (this._lastText) this.speak(this._lastText);
    },

    // ж’ӯж”ҫз»“жһңйЎөиҜӯйҹ?    resultSpeak(pct) {
        let id = 'r4';
        if (pct >= 100) id = 'r1';
        else if (pct >= 70) id = 'r2';
        else if (pct >= 40) id = 'r3';
        this.play(id).catch(()=>{});
    },
};

/* ================================================================
   жЁЎеқ— 1пјҡйҹіж•ҲпјҲAudioContext еҗҲжҲҗвҖ”вҖ”жӣҙжҹ”е’Ңзҡ„жҢүй’®йҹіпј?   ================================================================ */
const SFX = {
    _ctx: null,
    _getCtx() {
        if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this._ctx.state === 'suspended') this._ctx.resume();
        return this._ctx;
    },
    _tone(freq, duration, type, vol) {
        try {
            const ctx = this._getCtx();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = type || 'sine';
            o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(freq, ctx.currentTime);
            g.gain.setValueAtTime(vol || 0.12, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            o.start(ctx.currentTime);
            o.stop(ctx.currentTime + duration);
        } catch(e) {}
    },
    // зӯ”еҜ№пјҡдёҠиЎҢеҸҢйҹіпјҢжӮҰиҖ?    right() {
        const ctx = this._getCtx();
        [523, 784].forEach((f, i) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine'; o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
            g.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.25);
            o.start(ctx.currentTime + i * 0.1);
            o.stop(ctx.currentTime + i * 0.1 + 0.25);
        });
    },
    // зӯ”й”ҷпјҡжҹ”е’ҢдҪҺйҹіпјҢдёҚеҲәиҖ?    wrong() {
        this._tone(260, 0.2, 'sine', 0.08);
    },
    // еәҶзҘқпјҡдёүйҹійҳ¶дёҠиЎҢ
    fanfare() {
        [523, 659, 784].forEach((f, i) => {
            const ctx = this._getCtx();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'triangle'; o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
            g.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
            o.start(ctx.currentTime + i * 0.1);
            o.stop(ctx.currentTime + i * 0.1 + 0.3);
        });
    },
    // жҢүй’®зӮ№еҮ»пјҡзҹӯдҝғжё…и„?    click() { this._tone(880, 0.08, 'sine', 0.06); },
};

const Game = {

    rightSay: [

    _build() {
        const R = this._create;
        const gen = (fn, name) => { try { var a = fn.call(R, 2); if (a.length >= 2) return a; } catch(e) {} return R.safeFallback(2); };
        const pools = {
            count:   gen(R.counting, 'count'),

        const a = sh([...types]); const b = sh([...types]);
        if (b[0] === a[4]) { const t = b[0]; b[0] = b[1]; b[1] = t; }

        counting(n) {

            return counts.map(cnt => ({
                type:'count', voice:'q_count', q:'рҹҺҲ ж•°дёҖж•°пјҢжңүеҮ дёӘж°”зҗғпјҹ',
                render(area) {

                // й—®зҹӯ вҶ?жӯЈзЎ®зӯ”жЎҲжҳҜеҸҚзҡ„пјҲжҸҗеүҚз®—еҘҪпјҢдёҚең?render йҮҢз®—пј?                const target = p.askLonger ? (p.longer==='top'?'top':'bottom') : (p.longer==='top'?'bottom':'top');

                    ans:target, longer:p.longer,
                    render(area) {
                        area.innerHTML = `<div style="display:flex;flex-direction:column;gap:16px;align-items:center;width:100%;padding:8px 0;"><div class="click-group" data-correct="${target==='top'}" id="gT" style="width:90%;"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:18px;">рҹ‘Ҷ</span><div style="height:32px;border-radius:16px;background:linear-gradient(90deg,#87ceeb,#5ba3d9);width:${p.t}%;"></div></div><span class="hint">зӮ№иҝҷжқ?рҹ‘Ҷ</span></div><div class="click-group" data-correct="${target==='bottom'}" id="gB" style="width:90%;"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:18px;">рҹ‘Ү</span><div style="height:32px;border-radius:16px;background:linear-gradient(90deg,#ffb6c1,#ff7e9f);width:${p.b}%;"></div></div><span class="hint">зӮ№иҝҷжқ?рҹ‘Ү</span></div></div>`;
                        document.getElementById('gT').onclick=()=>Game._judgeDirect('gT',target==='top');
                        document.getElementById('gB').onclick=()=>Game._judgeDirect('gB',target==='bottom');
                    },
                };
            });
        },
        sorting(n) {
            const qs = [{items:['рҹҚҺ','рҹҚҺ','рҹҚҺ','рҹҚҠ'],ok:3},{items:['рҹҗұ','рҹҗұ','рҹҗ¶','рҹҗұ'],ok:2},{items:['рҹ”ҙ','рҹ”ҙ','рҹҹЎ','рҹ”ҙ'],ok:2},{items:['в¬?,'в¬?,'в¬?,'рҹҹ '],ok:3},{items:['рҹҡ—','рҹҡ—','рҹҡІ','рҹҡ—'],ok:2},{items:['рҹҢё','рҹҢё','рҹҢ»','рҹҢё'],ok:2}].sort(()=>Math.random()-0.5).slice(0,n);
            return qs.map(q => ({
                type:'sort', voice:'q_sort', q:'рҹ“Ұ жүҫеҮәдёҚдёҖж ·зҡ„йӮЈдёӘ', items:q.items,
                render(area) {
                    area.innerHTML = `<div class="sort-grid" id="soGrid"></div>`;
                    const g=document.getElementById('soGrid');
                    q.items.forEach((it,i)=>{const c=document.createElement('div');c.className='sort-card';c.textContent=it;c.dataset.idx=i;c.onclick=()=>Game._judge(c,i===q.ok);g.appendChild(c);});
                }, ans:q.ok,
            }));
        },
        position(n) {
            // жүҫдҪҚзҪ®пјҡе“ӘдёӘеңЁдёҠйқ?дёӢйқў/е·Ұиҫ№/еҸіиҫ№пјҹжӯЈзЎ®йҖүйЎ№ж”ҫеңЁеҜ№еә”дҪҚзҪ®пјҢзӣҙжҺҘзңӢеӣҫеҲӨж–?            const qs = [
                // з«–жҺ’пјҲдёҠ/дёӢпјүпјҡз¬¬дёҖдёӘеңЁи§Ҷи§үдёҠж–№пјҢз¬¬дәҢдёӘеңЁдёӢж–?                {pos:'top',    top:'рҹҗӨ', bottom:'рҹҗҹ', q:'е“ӘдёӘеңЁдёҠйқўе‘Җпј?, voice:'q_pos', name:'е°Ҹйёҹ'},
                {pos:'bottom', top:'рҹҗҹ', bottom:'рҹҗӨ', q:'е“ӘдёӘеңЁдёӢйқўе‘Җпј?, voice:'q_pos_bottom', name:'е°Ҹйёҹ'},
                // жЁӘжҺ’пјҲе·Ұ/еҸіпјүпјҡз¬¬дёҖдёӘеңЁи§Ҷи§үе·Ұиҫ№пјҢз¬¬дәҢдёӘеңЁеҸіиҫ?                {pos:'left',   left:'рҹҗұ', right:'рҹҗ¶', q:'е“ӘдёӘеңЁе·Ұиҫ№е‘Җпј?, voice:'q_pos2', name:'е°ҸзҢ«'},
                {pos:'right',  left:'рҹҗұ', right:'рҹҗ¶', q:'е“ӘдёӘеңЁеҸіиҫ№е‘Җпј?, voice:'q_pos_right', name:'е°ҸзӢ—'},
            ].sort(()=>Math.random()-0.5).slice(0,n);
            return qs.map(q => ({
                type:'pos', voice:q.voice, q:q.q, name:q.name,
                render(area) {
                    const isVert = q.pos==='top'||q.pos==='bottom';
                    if (isVert) {
                        area.innerHTML = `<div style="display:flex;flex-direction:column;gap:20px;align-items:center;padding:12px;"><div class="click-group" data-correct="${q.pos==='top'}" id="gA"><div style="font-size:64px;">${q.top}</div></div><div class="click-group" data-correct="${q.pos==='bottom'}" id="gB"><div style="font-size:64px;">${q.bottom}</div></div></div>`;
                    } else {
                        area.innerHTML = `<div style="display:flex;gap:24px;justify-content:center;align-items:center;padding:12px;"><div class="click-group" data-correct="${q.pos==='left'}" id="gA"><div style="font-size:64px;">${q.left}</div></div><div class="click-group" data-correct="${q.pos==='right'}" id="gB"><div style="font-size:64px;">${q.right}</div></div></div>`;
                    }
                    document.getElementById('gA').onclick=()=>Game._judgeDirect('gA', (isVert?q.pos==='top':q.pos==='left'));
                    document.getElementById('gB').onclick=()=>Game._judgeDirect('gB', (isVert?q.pos==='bottom':q.pos==='right'));
                }, ans:q.pos,
            }));
        },
    },

    // ========== жёІжҹ“еҪ“еүҚе…іеҚЎ ==========
    _render() {
        const rd = this.rounds[this.curIdx];
        if (!rd) { this._finish(); return; }
        Voice.stopAll(); // дёҠдёҖе…іж®Ӣз•ҷиҜӯйҹіе…ЁеҒ?        this._jumping = false;
        this.answered = false;
        document.getElementById('btnNext').style.display = 'none';
        const fb = document.getElementById('feedback'); fb.textContent = ''; fb.className = 'feedback-text';
        const pct = (this.curIdx / this.TOTAL) * 100;
        document.getElementById('pgFill').style.width = pct + '%';
        document.getElementById('pgText').textContent = `з¬?${this.curIdx+1} е…?/ е…?${this.TOTAL} е…і`;
        this._mascot('normal');
        document.getElementById('questionLabel').textContent = rd.q;
        rd.render(document.getElementById('playArea'));
        // жЎғеӯҗйҹіMP3иҜ»йўҳ
        if (rd.voice) { Voice.play(rd.voice); } else { setTimeout(() => Voice.speak(rd.q), 400); }
    },

    // ========== зӯ”йўҳеҲӨе®ҡпјҲchoice-btn / sort-cardпј?==========
    _judge(el, ok) {
        if (this.answered) return;
        this.answered = true;
        this._clearTimer();
        _disableAll('.choice-btn,.sort-card,.click-group');

        const fb = document.getElementById('feedback');
        const rd = this.rounds[this.curIdx];
        // жһ„йҖ жӯЈзЎ®зӯ”жЎҲзҡ„иҜӯйҹіж–Үжң¬
        const ansText = el.classList.contains('choice-btn')
            ? String(rd.ans)
            : (el.classList.contains('sort-card') ? (_emojiSay(rd.items[rd.ans])||'') : '');

        if (ok) {
            SFX.right();
            el.classList.add('ok');
            this.score++;
            fb.className = 'feedback-text ok';
            this._mascot('happy');
            const pa = document.getElementById('playArea');
            pa.style.background = '#f0fff4';
            setTimeout(() => { pa.style.background = ''; }, 600);
            Voice.praise((txt) => {
                fb.textContent = txt;
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 2000);
            });
        } else {
            SFX.wrong();
            el.classList.add('err');
            this._highlightCorrect(rd, el);
            fb.textContent = `жӯЈзЎ®зӯ”жЎҲжҳ?${ansText}пјҢжІЎе…ізі»е“Ұ~`;
            fb.className = 'feedback-text err';
            this._mascot('confused');
            Voice.correctHint(ansText, () => {
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 3000);
            });
        }
        this._showBtn();
    },

    // ========== зӣҙжҺҘзӮ№еҮ»еҲӨе®ҡпјҲclick-groupпј?==========
    _judgeDirect(elId, ok) {
        if (this.answered) return;
        this.answered = true;
        this._clearTimer();
        _disableAll('.choice-btn,.sort-card,.click-group');

        const el = document.getElementById(elId);
        const fb = document.getElementById('feedback');

        if (ok) {
            SFX.right();
            el.classList.add('bounce');
            this.score++;
            fb.className = 'feedback-text ok';
            this._mascot('happy');
            const pa = document.getElementById('playArea');
            pa.style.background = '#f0fff4';
            setTimeout(() => { pa.style.background = ''; }, 600);
            Voice.praise((txt) => {
                fb.textContent = txt;
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 2000);
            });
        } else {
            SFX.wrong();
            el.classList.add('shake');
            document.querySelectorAll('.click-group').forEach(g => {
                if (g.dataset.correct === 'true') g.classList.add('highlight');
            });
            fb.textContent = 'еҶҚзңӢдёҖдёӢжӯЈзЎ®зӯ”жЎҲе“Ұ~';
            fb.className = 'feedback-text err';
            this._mascot('confused');
            const rd = this.rounds[this.curIdx];
            let hint = '';
            if (rd.type === 'compare') hint = rd.correct === 'left' ? 'е·Ұиҫ№' : 'еҸіиҫ№';
            else if (rd.type === 'length') hint = rd.ans === 'top' ? 'дёҠйқўйӮЈжқЎ' : 'дёӢйқўйӮЈжқЎ';
            else if (rd.type === 'pos') hint = rd.name || '';
            Voice.correctHint(hint || 'иҝҷдёҖдё?, () => {
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 3000);
            });
        }
        this._showBtn();
    },

    // й«ҳдә®жӯЈзЎ®зӯ”жЎҲ
    _highlightCorrect(rd, el) {
        if (el.classList.contains('choice-btn')) {
            document.querySelectorAll('.choice-btn').forEach(b => {
                if (parseInt(b.querySelector('.num')?.textContent) === rd.ans) b.classList.add('ok');
            });
        } else if (el.classList.contains('sort-card')) {
            document.querySelectorAll('.sort-card').forEach(c => {
                if (parseInt(c.dataset.idx) === rd.ans) c.classList.add('ok');
            });
        }
    },

    _showBtn() {
        const btn = document.getElementById('btnNext');
        btn.style.display = 'inline-block';
        btn.textContent = this.curIdx >= this.TOTAL - 1 ? 'зңӢз»“жһ?рҹҺү' : 'дёӢдёҖе…?вһЎпёҸ';
    },
    _clearTimer() {
        if (this._timer) { clearTimeout(this._timer); this._timer = null; }
    },

    // ========== дёӢдёҖе…?==========
    next() {
        this._jumping = true;  // йҳ»жӯўж®Ӣз•ҷзҡ„иҜӯйҹіеӣһи°?        this._clearTimer();
        this.curIdx++;
        if (this.curIdx >= this.TOTAL) { this._finish(); return; }
        this._render();
    },

    // ========== з»“жқҹ ==========
    _finish() {
        _show('scResult');
        const pct = Math.round((this.score / this.TOTAL) * 100);
        document.getElementById('resultScore').textContent = `${this.score} / ${this.TOTAL}`;

        let msg, stars;
        if (pct === 100)      { msg='ж»ЎеҲҶйҖҡе…іпјҒдҪ жҳҜжңҖжЈ’зҡ„ж•°еӯҰе°ҸеӨ©жүҚпјҒрҹҺҠрҹҺҠрҹҺҠ е°ҸдјҒй№…дёәдҪ з–ҜзӢӮйј“жҺҢпјҒ'; stars=3; SFX.fanfare(); this._confetti(); }
        else if (pct >= 70)   { msg='еӨӘеҺүе®іе•ҰпјҒдҪ й—ҜиҝҮдәҶеӨ§йғЁеҲҶе…іеҚЎпјҢеҶҚзҺ©дёҖж¬Ўе°ұиғҪжӢҝж»ЎеҲҶе’Ҝрҹ’?; stars=3; SFX.fanfare(); }
        else if (pct >= 40)   { msg='дёҚй”ҷе“ҰпјҒдҪ еӯҰдјҡдәҶеҘҪеӨҡжң¬йўҶпјҢеҶҚжқҘдёҖж¬ЎдјҡжӣҙеҘҪпјҒрҹҳ?; stars=2; }
        else                  { msg='жІЎе…ізі»пјҢе°ҸдјҒй№…йҷӘдҪ еӨҡз»ғеҮ ж¬ЎпјҢдёӢж¬ЎдёҖе®ҡжӣҙжЈ’пјҒрҹ§ё'; stars=1; }
        document.getElementById('resultMsg').textContent = msg;

        const sc = document.getElementById('resultStars');
        sc.innerHTML = '';
        for (let i=0;i<3;i++) {
            const s = document.createElement('span');
            s.className = 'result-star';
            s.textContent = i < stars ? 'вӯ? : 'вҳ?;
            s.style.animationDelay = (i*0.15)+'s';
            if (i>=stars) s.style.opacity = '0.3';
            sc.appendChild(s);
        }

        Voice.resultSpeak(pct);
    },

    // ========== зәёеұ‘ ==========
    _confetti() {
        const box = document.createElement('div');
        box.className = 'confetti-box'; document.body.appendChild(box);
        const cs = ['#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#ff9500','#a29bfe','#fd79a8'];
        for (let i=0;i<60;i++) {
            const p = document.createElement('div');
            p.className = 'confetti-piece';
            p.style.left = Math.random()*100+'%'; p.style.top = '-10px';
            p.style.background = cs[i%cs.length];
            p.style.width = (Math.random()*6+4)+'px';
            p.style.height = (Math.random()*6+4)+'px';
            p.style.animationDuration = (Math.random()*2+2)+'s';
            p.style.animationDelay = (Math.random()*1.5)+'s';
            box.appendChild(p);
        }
        setTimeout(()=>box.remove(), 6000);
    },

    // ========== иҗҢе® иЎЁжғ… ==========
    _mascot(mood) {
        const el = document.getElementById('mascotAv');
        if (!el) return;
        const map = {
            normal:   'mascot-penguin',
            happy:    'mascot-penguin-happy',
            confused: 'mascot-penguin-confused',
        };
        el.className = 'mascot-avatar ' + (map[mood] || map.normal);
    },
};

/* ================================================================
   жЁЎеқ— 3пјҡе·Ҙе…·еҮҪж•?   ================================================================ */
function _show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function _emojiSay(emoji) { const m={'рҹҚҺ':'иӢ№жһң','рҹҚҠ':'ж©ҳеӯҗ','рҹҗұ':'е°ҸзҢ«','рҹҗ¶':'е°ҸзӢ—','рҹ”ҙ':'зәўиүІ','рҹҹЎ':'й»„иүІ','в¬?:'й»‘иүІ','рҹҹ ':'ж©ҳиүІ','рҹҡ—':'жұҪиҪҰ','рҹҡІ':'иҮӘиЎҢиҪ?,'рҹҢё':'е°ҸиҠұ','рҹҢ»':'еҗ‘ж—Ҙи‘?}; return m[emoji]||''; }
function _rand(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
function _pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function _disableAll(sel) {
    document.querySelectorAll(sel).forEach(e => e.classList.add('disabled'));
}

/* ================================================================
   еҗҜеҠЁ
   ================================================================ */
window.onload = () => {
    document.documentElement.setAttribute('data-sign', 'MathGame_AmusementPark_20260614');
    Voice.init();
    // йў„еҠ иҪҪеӣҫзү?    ['жёёжҲҸдәәзү©и§’иүІ/дјҒй№…_ж•°ж•°.png','жёёжҲҸдә’еҠЁиЎЁжғ…/дјҒй№…_ејҖеҝ?png','жёёжҲҸдә’еҠЁиЎЁжғ…/дјҒй№…_з–‘жғ‘.png'].forEach(u => {
        const img = new Image(); img.src = u;
    });
};
