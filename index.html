<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学游戏分享 - 一年级数学AI大冒险</title>
    <style>
        /* ============================================================
           全局基础
           ============================================================ */
        * { margin:0; padding:0; box-sizing:border-box; font-family:"微软雅黑","PingFang SC",sans-serif; }
        body {
            min-height:100vh; background:#f0f8ff;
            display:flex; justify-content:center; align-items:center;
            padding:16px; overflow-x:hidden;
        }
        .container {
            width:100%; max-width:820px; background:#fff; border-radius:28px;
            padding:28px; box-shadow:0 4px 24px rgba(0,0,0,0.06);
            position:relative; min-height:520px;
        }
        .container::after {
            content:"小数工具铺"; position:absolute; bottom:8px; right:12px;
            font-size:12px; color:#ddd; pointer-events:none; z-index:0;
        }

        /* ============================================================
           画面切换
           ============================================================ */
        .screen { display:none; flex-direction:column; align-items:center; gap:16px; }
        .screen.active { display:flex; }

        /* ============================================================
           组件：标题 / 进度条 / 萌宠 / 反馈
           ============================================================ */
        .game-title {
            font-size:32px; color:#ff7e5f; text-align:center;
            text-shadow:2px 2px 4px #ffe0d6; margin-bottom:4px;
        }
        .sub-title { font-size:16px; color:#999; text-align:center; margin-bottom:8px; }

        .progress-wrap { width:100%; max-width:580px; }
        .progress-bar { width:100%; height:8px; background:#e8e8e8; border-radius:4px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#4cd964,#ff9500); border-radius:4px; transition:width 0.4s; }
        .progress-text { font-size:14px; color:#aaa; text-align:center; margin-top:4px; }

        .mascot-area {
            display:flex; align-items:center; gap:12px;
            background:#f7fbff; border-radius:18px; padding:14px 22px;
            width:100%; max-width:500px; margin:8px 0; border:2px solid #e8f0fe;
        }
        .mascot-avatar {
            width:64px; height:64px; border-radius:50%; flex-shrink:0;
            background-size:contain; background-position:center; background-repeat:no-repeat;
            display:flex; align-items:center; justify-content:center; font-size:42px;
        }
        .mascot-penguin     { background-image:url('游戏人物角色/企鹅_数数.png'); color:transparent; }
        .mascot-penguin-happy { background-image:url('游戏互动表情/企鹅_开心.png'); color:transparent; }
        .mascot-penguin-confused { background-image:url('游戏互动表情/企鹅_疑惑.png'); color:transparent; }
        .mascot-speech { flex:1; font-size:18px; color:#555; line-height:1.5; }
        .mascot-speech .hl { color:#ff7e5f; font-weight:bold; }

        .play-area {
            width:100%; max-width:580px; min-height:200px;
            background:#fafcff; border:2px solid #e8f2fa;
            border-radius:20px; padding:24px;
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; gap:16px; position:relative;
        }
        .feedback-text {
            font-size:24px; font-weight:bold; min-height:36px;
            text-align:center; animation:popIn 0.35s ease;
        }
        .feedback-text.ok  { color:#4cd964; }
        .feedback-text.err { color:#ff6b6b; }
        .feedback-text.big { color:#ff9500; font-size:28px; }

        /* ============================================================
           按钮
           ============================================================ */
        .btn {
            padding:14px 36px; font-size:20px; font-weight:bold;
            border:none; border-radius:14px; cursor:pointer;
            transition:all 0.2s; user-select:none;
            -webkit-tap-highlight-color:transparent;
        }
        .btn:active { transform:scale(0.95); }
        .btn-go   {
            background:#4cd964; color:#fff; font-size:24px; padding:18px 48px;
            box-shadow:0 4px 18px rgba(76,217,100,0.3);
            animation:pulseBtn 2s ease-in-out infinite;
        }
        @keyframes pulseBtn {
            0%,100%{box-shadow:0 4px 18px rgba(76,217,100,0.3)}
            50%{box-shadow:0 4px 30px rgba(76,217,100,0.6);transform:scale(1.04)}
        }
        .btn-go:hover { opacity:0.9; animation:none; }
        .btn-go:disabled { background:#ccc; cursor:not-allowed; opacity:0.7; animation:none; }
        .btn-next { background:#ff9500; color:#fff; }
        .btn-next:hover { opacity:0.9; }
        .btn-listen {
            background:#e8f4fd; border:2px solid #87ceeb;
            font-size:18px; cursor:pointer; padding:4px 14px;
            border-radius:20px; color:#555; display:inline-flex;
            align-items:center; gap:4px; transition:all 0.2s;
        }
        .btn-listen:hover { background:#d0e8f7; }
        .btn-listen.speaking { background:#ffe0d6; border-color:#ff7e5f; }

        /* ============================================================
           交互控件
           ============================================================ */
        .choices {
            display:flex; flex-wrap:wrap; gap:14px; justify-content:center;
        }
        /* 数字按钮 + 点数 */
        .choice-btn {
            width:82px; min-height:90px; border-radius:18px;
            border:4px solid #87ceeb; background:#fff;
            cursor:pointer; transition:all 0.15s;
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; padding:8px 6px; gap:4px;
        }
        .choice-btn:hover { background:#e8f4fd; border-color:#ff7e5f; transform:scale(1.06); }
        .choice-btn:active { transform:scale(0.9); }
        .choice-btn .num { font-size:30px; font-weight:bold; color:#333; }
        .choice-btn.ok { background:#4cd964; border-color:#4cd964; }
        .choice-btn.ok .num { color:#fff; }
        .choice-btn.err { background:#ff6b6b; border-color:#ff6b6b; animation:shake 0.4s; }
        .choice-btn.err .num { color:#fff; }
        .choice-btn.disabled { pointer-events:none; opacity:0.55; }

        /* 直接点击区域（小朋友直接点图案——大块+脉冲边框提示可点） */
        .click-group {
            cursor:pointer; border:5px dashed #ffb6c1;
            border-radius:20px; padding:16px 24px;
            transition:all 0.2s; text-align:center;
            animation:pulseBorder 2s ease-in-out infinite;
        }
        @keyframes pulseBorder {
            0%,100%{border-color:#ffb6c1}
            50%{border-color:#ff7e5f}
        }
        .click-group:hover { border-color:#ff7e5f; background:#fff5f7; transform:scale(1.04); animation:none; }
        .click-group:active { transform:scale(0.94); }
        .click-group .hint { font-size:16px; color:#ff7e5f; font-weight:bold; display:block; margin-top:8px; }
        .click-group.bounce { border-color:#4cd964; background:#f0fff4; animation:bounce 0.5s; }
        .click-group.shake  { border-color:#ff6b6b; background:#fff0f0; animation:shake 0.4s; }
        .click-group.highlight { border-color:#4cd964; background:#f0fff4; }
        .click-group.disabled { pointer-events:none; opacity:0.55; animation:none; }

        /* 分类卡片 */
        .sort-grid { display:flex; flex-wrap:wrap; gap:18px; justify-content:center; }
        .sort-card {
            width:88px; height:88px; border-radius:20px;
            border:4px solid #e0e8f0; background:#fafcff;
            display:flex; align-items:center; justify-content:center;
            font-size:44px; cursor:pointer; transition:all 0.15s;
        }
        .sort-card:hover { border-color:#ffb6c1; transform:scale(1.08); background:#fff5f7; }
        .sort-card:active { transform:scale(0.9); }
        .sort-card.ok { border-color:#4cd964; background:#e8f8ef; border-width:5px; }
        .sort-card.err { border-color:#ff6b6b; background:#ffe8e8; animation:shake 0.4s; }
        .sort-card.disabled { pointer-events:none; opacity:0.55; }

        /* ============================================================
           画面元素
           ============================================================ */
        .items-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; padding:10px; }
        .balloon {
            width:48px; height:56px; border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
            position:relative; animation:floatAnim 2s ease-in-out infinite;
            display:flex; align-items:center; justify-content:center; font-size:20px;
        }
        .balloon::after {
            content:""; position:absolute; bottom:-12px; left:50%;
            width:1px; height:12px; background:#bbb;
        }
        .balloon:nth-child(1) { animation-delay:0s; }
        .balloon:nth-child(2) { animation-delay:0.2s; }
        .balloon:nth-child(3) { animation-delay:0.4s; }
        .balloon:nth-child(4) { animation-delay:0.1s; }
        .balloon:nth-child(5) { animation-delay:0.3s; }
        .balloon:nth-child(6) { animation-delay:0.5s; }
        .balloon:nth-child(7) { animation-delay:0.15s; }
        .balloon:nth-child(8) { animation-delay:0.35s; }

        .welcome-decor { font-size:48px; text-align:center; margin:4px 0; }
        .welcome-bg {
            width:100%; max-width:560px; height:160px;
            background:url('游戏背景图/游乐园.png') center/cover no-repeat;
            border-radius:16px; margin:4px 0 12px 0; opacity:0.9;
        }
        .game-cards { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin:8px 0; }
        .game-card {
            width:120px; padding:16px 8px; border-radius:16px;
            background:#f7fbff; border:2px solid #e0edf5;
            text-align:center; cursor:default;
        }
        .game-card .icon { font-size:40px; }
        .game-card .name { font-size:14px; color:#666; margin-top:4px; }

        /* 结果页 */
        .result-stars { display:flex; gap:8px; margin:12px 0; }
        .result-star {
            font-size:52px; animation:popIn 0.4s ease backwards;
        }
        .result-star:nth-child(1) { animation-delay:0.1s; }
        .result-star:nth-child(2) { animation-delay:0.25s; }
        .result-star:nth-child(3) { animation-delay:0.4s; }
        .result-score { font-size:48px; color:#ff7e5f; font-weight:bold; }

        /* 纸屑 */
        .confetti-box { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; }
        .confetti-piece {
            position:absolute; width:10px; height:10px; border-radius:2px;
            animation:confettiDrop 3s ease-in forwards;
        }

        /* ============================================================
           动画
           ============================================================ */
        @keyframes bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes shake   { 0%,100%{transform:translateX(0)} 25%,75%{transform:translateX(-6px)} 50%{transform:translateX(6px)} }
        @keyframes floatAnim { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
        @keyframes popIn   { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
        @keyframes confettiDrop { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(400px) rotate(720deg);opacity:0} }

        /* ============================================================
           响应式
           ============================================================ */
        @media (max-width:480px) {
            .container { padding:16px; border-radius:16px; }
            .game-title { font-size:24px; }
            .welcome-bg { height:100px; }
            .mascot-avatar { width:48px; height:48px; font-size:30px; }
            .mascot-speech { font-size:15px; }
            .balloon { width:38px; height:44px; font-size:16px; }
            .choice-btn { width:64px; min-height:70px; }
            .choice-btn .num  { font-size:24px; }
            .sort-card { width:68px; height:68px; font-size:36px; }
            .click-group { padding:12px 16px; }
            .click-group .hint { font-size:14px; }
            .result-score { font-size:36px; }
        }

        .copyright { font-size:12px; color:#ddd; margin-top:12px; text-align:center; }
    </style>
</head>
<body>
<div class="container">

<!-- ================================================================
     画面1 — 欢迎页
     ================================================================ -->
<div class="screen active" id="scWelcome">
    <div class="welcome-decor">🎪🎈🎠</div>
    <div class="game-title">🎮 数学游戏分享</div>
    <div class="sub-title">和小企鹅「数数」一起玩数学吧！</div>
    <div class="welcome-bg"></div>

    <div class="mascot-area">
        <div class="mascot-avatar mascot-penguin">🐧</div>
        <div class="mascot-speech">
            你好呀！我是小企鹅 <span class="hl">数数</span> ~<br>
            今天我们要玩 <span class="hl">5 个</span> 数学小游戏，准备好了吗？
        </div>
    </div>

    <div class="game-cards">
        <div class="game-card"><div class="icon">🔢</div><div class="name">数一数</div></div>
        <div class="game-card"><div class="icon">⚖️</div><div class="name">比一比</div></div>
        <div class="game-card"><div class="icon">📏</div><div class="name">比长短</div></div>
        <div class="game-card"><div class="icon">📦</div><div class="name">分分类</div></div>
        <div class="game-card"><div class="icon">🔍</div><div class="name">找一找</div></div>
    </div>

    <button class="btn btn-go" onclick="Game.start()">出发玩咯 🚀</button>
    <div class="copyright">仅限本机个人使用，禁止二次分发倒卖</div>
</div>

<!-- ================================================================
     画面2 — 游戏画面
     ================================================================ -->
<div class="screen" id="scGame">
    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="pgFill" style="width:0%"></div></div>
        <div class="progress-text" id="pgText">第 1 关 / 共 10 关</div>
    </div>

    <div class="mascot-area">
        <div class="mascot-avatar" id="mascotAv">🐧</div>
        <div class="mascot-speech" id="mascotSp">
            <span class="hl" id="questionLabel"></span>
            <button class="btn-listen" id="btnListen" onclick="Voice.replay()" title="再听一遍">🔊</button>
        </div>
    </div>

    <div class="play-area" id="playArea"><!-- JS渲染 --></div>
    <div class="feedback-text" id="feedback"></div>

    <button class="btn btn-next" id="btnNext" style="display:none" onclick="SFX.click();Game.next()">下一关 ➡️</button>
</div>

<!-- ================================================================
     画面3 — 结果页
     ================================================================ -->
<div class="screen" id="scResult">
    <div class="game-title" style="margin-top:20px;">🎉 闯关完成 🎉</div>

    <div class="mascot-area" style="max-width:400px;">
        <div class="mascot-avatar mascot-penguin-happy">🐧</div>
        <div class="mascot-speech" id="resultMsg">你太棒啦！</div>
    </div>

    <div class="result-stars" id="resultStars">
        <span class="result-star">⭐</span><span class="result-star">⭐</span><span class="result-star">⭐</span>
    </div>

    <div style="text-align:center;">
        <div style="font-size:18px;color:#666;">得分</div>
        <div class="result-score" id="resultScore">10/10</div>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <button class="btn btn-go"  onclick="Game.start()">再玩一次 🔄</button>
        <button class="btn btn-next" onclick="SFX.click();Game.home()">回到首页 🏠</button>
    </div>
    <div class="copyright">仅限本机个人使用，禁止二次分发倒卖</div>
</div>

</div><!-- /container -->

<!-- ================================================================
     JS 主逻辑
     ================================================================ -->
<script>
/* ================================================================
   模块 0：语音引擎
   优先加载预生成的豆包桃子音 MP3，找不到则用浏览器 TTS 兜底。
   所有 mp3 放入 audio/ 文件夹，文件名即下方编号。
   生成方式见文件末尾的 Python 脚本。
   ================================================================ */
const Voice = {
    _base: 'audio/',
    _cache: {},
    _lastText: '',

    // ========== 预生成音频映射：id → 文件名 ==========
    // 用法：Voice.play('p1')  → 播放 audio/p1.mp3
    _clips: {

        // ── 夸奖（8句，答对随机抽） ──
        p1: '太棒啦！你真聪明！',
        p2: '答对咯！你好厉害呀！',
        p3: '哇，全对！小脑袋转得真快！',
        p4: '真了不起，一百分！',
        p5: '又答对了，你真是小天才！',
        p6: '好棒呀！企鹅给你拍拍手~',
        p7: '没错！你越来越厉害了！',
        p8: '答对啦，闪闪亮亮就是你！',

        // ── 答错告知答案（3句，随机抽） ──
        w1: '正确答案是',
        w2: '应该是',
        w3: '再想想，答案是',

        // ── 答错后半段（通用，拼接在答案后面） ──
        e1: '没关系，我们看看下一题吧',
        e2: '慢慢来，下次就对啦',
        e3: '你已经很棒了，继续加油',

        // ── 结果页 ──
        r1: '满分通关！你是最棒的数学小天才！小企鹅为你疯狂鼓掌！',
        r2: '太厉害啦！你闯过了大部分关卡，再玩一次就能拿满分咯！',
        r3: '不错哦！你学会了好多本领，再来一次会更好！',
        r4: '没关系，小企鹅陪你多练几次，下次一定更棒！',

        // ── 欢迎语 + 游戏提示 ──
        welcome: '你好呀！我是小企鹅数数~今天我们要玩五个数学小游戏，准备好了吗？',
        q_count: '数一数，下面有几个气球呀？',
        q_compare: '哪边更多呀？点点多的那边',
        q_compare_fewer: '哪边更少呀？点点少的那边',
        q_len_long: '哪条更长呀？点点长的那条',
        q_len_short: '哪条更短呀？点点短的那条',
        q_sort: '找出不一样的那个哦',
        q_pos: '看一看，哪个在上面呀？',
        q_pos2: '看一看，哪个在左边呀？',
        q_pos_bottom: '看一看，哪个在下面呀？',
        q_pos_right: '看一看，哪个在右边呀？',
    },

    // ========== 初始化：预加载音频 ==========
    init() {
        Object.keys(this._clips).forEach(id => {
            const a = new Audio();
            a.preload = 'auto';
            a.src = this._base + id + '.mp3';
            this._cache[id] = a;
        });
    },

    // 停止所有正在播放的语音
    stopAll() {
        Object.values(this._cache).forEach(a => { try { a.pause(); a.currentTime = 0; } catch(e) {} });
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    },

    // ========== 播放指定片段（懒加载 + 手机自动重试） ==========
    _playedSilent: false,
    play(id) {
        this.stopAll();
        let a = this._cache[id];
        if (!a) {
            a = new Audio(); a.preload = 'auto'; a.src = this._base + id + '.mp3';
            this._cache[id] = a;
        }
        a.currentTime = 0;
        a.play().catch(() => {
            // 手机端首次播放失败：播无声 WAV 解锁后再试一次
            if (!this._playedSilent) {
                this._playedSilent = true;
                try {
                    var p = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
                    p.play().then(() => { a.currentTime = 0; a.play().catch(() => {}); }).catch(() => {});
                } catch(e) {}
            }
        });
    },

    // ========== 朗读文字（题目用——动态内容走浏览器 TTS） ==========
    speak(text) {
        if (!text || text.trim() === '') return;
        const clean = text.replace(/[\u{1F600}-\u{1F9FF}\u{2600}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{200D}\u{FE0F}]/gu, '').replace(/\s+/g, ' ').trim();
        if (!clean) return;
        this._lastText = clean;

        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(clean);
        u.lang = 'zh-CN';
        u.rate = 0.9;
        u.pitch = 1.2;
        u.volume = 1;
        const voices = window.speechSynthesis.getVoices();
        const zh = voices.find(v => /huihui|female|girl|yaoyao/i.test(v.name) && v.lang.startsWith('zh')) ||
                   voices.find(v => v.lang.startsWith('zh'));
        if (zh) u.voice = zh;
        window.speechSynthesis.speak(u);
    },

    // ========== 答对 → 随机播夸奖 mp3 + 返回对应文字 ==========
    praise(onDone) {
        const n = Math.floor(Math.random() * 8) + 1;
        const txt = this._clips['p' + n] || '';
        const a = this._cache['p' + n];
        if (a && a.duration > 0) {
            a.currentTime = 0;
            a.onended = () => { if (onDone) onDone(txt); };
            a.play().catch(() => {
                if (onDone) setTimeout(() => onDone(txt), 500);
            });
        } else {
            if (onDone) setTimeout(() => onDone(txt), 500);
        }
    },

    // ========== 答错 → wX.mp3 → 答案 → eX.mp3（有mp3用mp3，没有用TTS兜底） ==========
    correctHint(correctAns, onDone) {
        const wi = Math.floor(Math.random() * 3) + 1;
        const ei = Math.floor(Math.random() * 3) + 1;
        const aW = this._ensureLoaded('w' + wi);
        const aE = this._ensureLoaded('e' + ei);
        const ansId = this._ansToId(correctAns);
        const aAns = ansId ? this._ensureLoaded(ansId) : null;
        const done = () => { if (onDone) onDone(); };

        // 如果答案有对应 mp3 → 纯 MP3 链播放
        if (aAns) {
            const list = [aW, aAns, aE].filter(Boolean);
            const playNext = (idx) => {
                if (idx >= list.length) { done(); return; }
                const a = list[idx]; if (!a) { playNext(idx + 1); return; }
                a.currentTime = 0; a.onended = () => playNext(idx + 1);
                a.onerror = () => playNext(idx + 1);
                a.play().catch(() => playNext(idx + 1));
            };
            playNext(0);
            return;
        }

        // 没有对应 mp3 → w.mp3 + TTS 答案 + e.mp3
        if (aW) {
            aW.currentTime = 0;
            aW.onended = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(String(correctAns));
                    u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.2; u.volume = 1;
                    const voices = window.speechSynthesis.getVoices();
                    const zh = voices.find(v => /huihui|female|girl|yaoyao/i.test(v.name) && v.lang.startsWith('zh')) ||
                               voices.find(v => v.lang.startsWith('zh'));
                    if (zh) u.voice = zh;
                    u.onend = () => { if (aE) { aE.currentTime = 0; aE.onended = done; aE.play().catch(done); } else done(); };
                    u.onerror = () => { if (aE) { aE.currentTime = 0; aE.onended = done; aE.play().catch(done); } else done(); };
                    window.speechSynthesis.speak(u);
                } else {
                    if (aE) { aE.currentTime = 0; aE.onended = done; aE.play().catch(done); } else done();
                }
            };
            aW.play().catch(() => done());
        } else {
            setTimeout(done, 1000);
        }
    },

    // 答案文本 → mp3 编号映射
    _ansToId(ans) {
        const s = String(ans).trim();
        // 数字 3-20
        if (/^\d+$/.test(s) && +s >= 3 && +s <= 20) return 'n' + s;
        // 方向词
        const dirMap = { '上面':'d_top', '下面':'d_bottom', '左边':'d_left', '右边':'d_right',
                         '更多':'d_more', '更少':'d_fewer', '更长':'d_long', '更短':'d_short',
                         '左边更多':'d_left', '右边更多':'d_right', '上面那条':'d_top', '下面那条':'d_bottom',
                         '上面':'d_top', '下面':'d_bottom', '左边':'d_left', '右边':'d_right',
                         };
        for (const [k, v] of Object.entries(dirMap)) {
            if (s.includes(k)) return v;
        }
        // 找位置游戏：emoji 名字
        const nameMap = { '小鸟':'s_bird', '小鱼':'s_fish', '小猫':'s_cat', '小狗':'s_dog' };
        if (nameMap[s]) return nameMap[s];
        return null;
    },

    _ensureLoaded(id) {
        if (!this._cache[id]) {
            const a = new Audio(); a.preload = 'auto'; a.src = this._base + id + '.mp3';
            this._cache[id] = a;
        }
        return this._cache[id];
    },

    // 重新读题
    replay() {
        const rd = Game.rounds[Game.curIdx];
        if (rd && rd.voice) this.play(rd.voice);
        else if (this._lastText) this.speak(this._lastText);
    },

    // 播放结果页语音
    resultSpeak(pct) {
        let id = 'r4';
        if (pct >= 100) id = 'r1';        // 满分
        else if (pct >= 70) id = 'r2';    // 太厉害啦
        else if (pct >= 40) id = 'r3';    // 不错哦
        this.play(id);
    },
};

/* ================================================================
   模块 1：音效（AudioContext 合成——更柔和的按钮音）
   ================================================================ */
const SFX = {
    _ctx: null,
    _getCtx() {
        if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this._ctx.state === 'suspended') this._ctx.resume();
        return this._ctx;
    },
    _tone(freq, duration, type, vol) {
        try {
            const ctx = this._getCtx();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = type || 'sine';
            o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(freq, ctx.currentTime);
            g.gain.setValueAtTime(vol || 0.12, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            o.start(ctx.currentTime);
            o.stop(ctx.currentTime + duration);
        } catch(e) {}
    },
    // 答对：上行双音，悦耳
    right() {
        const ctx = this._getCtx();
        [523, 784].forEach((f, i) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine'; o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
            g.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.25);
            o.start(ctx.currentTime + i * 0.1);
            o.stop(ctx.currentTime + i * 0.1 + 0.25);
        });
    },
    // 答错：柔和低音，不刺耳
    wrong() {
        this._tone(260, 0.2, 'sine', 0.08);
    },
    // 庆祝：三音阶上行
    fanfare() {
        [523, 659, 784].forEach((f, i) => {
            const ctx = this._getCtx();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'triangle'; o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
            g.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
            o.start(ctx.currentTime + i * 0.1);
            o.stop(ctx.currentTime + i * 0.1 + 0.3);
        });
    },
    // 按钮点击：短促清脆
    click() { this._tone(880, 0.08, 'sine', 0.06); },
};

/* ================================================================
   模块 2：核心游戏
   ================================================================ */
const Game = {
    TOTAL: 10,
    rounds: [],
    curIdx: 0,
    score: 0,
    answered: false,
    _timer: null,
    _jumping: false, // 防止语音回调重复跳关

    // ========== 文案库（洪恩式：多样夸奖，柔性和引导） ==========
    rightSay: [
        "太棒啦！你真聪明！",
        "答对咯！你好厉害呀！",
        "哇，全对！小脑袋转得真快！",
        "真了不起，一百分！",
        "又答对了，你真是小天才！",
        "好棒呀！企鹅给你拍拍手~",
        "没错！你越来越厉害了！",
        "答对啦，闪闪亮亮就是你！",
    ],
    wrongSay: [
        "没关系，看看正确答案哦~",
        "差一点点，下次就对啦！",
        "不着急，慢慢来~",
        "已经很棒了，再看看答案吧~",
    ],

    // ========== 启动（播完欢迎语再进游戏，最多等8秒） ==========
    start() {
        this.score = 0; this.curIdx = 0; this._jumping = false;
        // 手机/安卓音频解锁：播放一段无声 WAV 唤醒音频系统（必须在用户手势内执行）
        try { new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=").play(); } catch(e) {}
        // 构建题库
        try { this._build(); } catch(e) { this.rounds = this._create.safeFallback(10); }
        // 播欢迎语，播完等2秒
        const go = () => { _show('scGame'); this._render(); };
        try {
            const a = Voice._cache['welcome'];
            if (a) { a.currentTime = 0; a.onended = () => setTimeout(go, 2000); a.play().catch(() => setTimeout(go, 7000)); }
            else setTimeout(go, 1000);
        } catch(e) { setTimeout(go, 1000); }
        setTimeout(go, 8000);
    },
    home() { _show('scWelcome'); },

    // ========== 构建题库（5种×2=10关，绝不连续同类型） ==========
    _build() {
        const R = this._create;
        const gen = (fn, name) => { try { var a = fn.call(R, 2); if (a.length >= 2) return a; } catch(e) {} return R.safeFallback(2); };
        const pools = {
            count:   gen(R.counting, 'count'),
            compare: gen(R.comparing, 'compare'),
            length:  gen(R.length, 'length'),
            sort:    gen(R.sorting, 'sort'),
            pos:     gen(R.position, 'pos'),
        };
        const types = ['count','compare','length','sort','pos'];
        function sh(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
        const a = sh([...types]); const b = sh([...types]);
        if (b[0] === a[4]) { const t = b[0]; b[0] = b[1]; b[1] = t; }
        this.rounds = [...a, ...b].map(t => pools[t].shift());
    },

    /* ---------- 题型工厂 ---------- */
    _create: {
        // 安全兜底：纯数数题
        safeFallback(n) {
            const arr = [];
            for (let i=0;i<n;i++) {
                const cnt = (i%6)+3;
                arr.push({type:'count',voice:'q_count',q:'🎈 数一数，有几个气球？',ans:cnt,
                    render(area){
                        area.innerHTML = `<div class="items-grid" id="itGrid"></div><div class="choices" id="itChoices"></div>`;
                        const grid=document.getElementById('itGrid');
                        const cs=['#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#ff9500','#a29bfe','#fd79a8','#00b894'];
                        for(let j=0;j<cnt;j++){const b=document.createElement('div');b.className='balloon';b.style.background=cs[j%cs.length];b.textContent='🎈';grid.appendChild(b);}
                        const opts=new Set([cnt]);while(opts.size<5)opts.add(_rand(Math.max(1,cnt-3),cnt+3));
                        const div=document.getElementById('itChoices');
                        [...opts].sort(()=>Math.random()-0.5).forEach(n=>{const b=document.createElement('button');b.className='choice-btn';b.innerHTML=`<span class="num">${n}</span>`;b.onclick=()=>Game._judge(b,n===cnt);div.appendChild(b);});
                    }
                });
            }
            return arr;
        },
        counting(n) {
            const counts = [3,4,5,6,7,8].sort(()=>Math.random()-0.5).slice(0,n);
            return counts.map(cnt => ({
                type:'count', voice:'q_count', q:'🎈 数一数，有几个气球？',
                render(area) {
                    area.innerHTML = `<div class="items-grid" id="itGrid"></div><div class="choices" id="itChoices"></div>`;
                    const grid = document.getElementById('itGrid');
                    const cs = ['#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#ff9500','#a29bfe','#fd79a8','#00b894'];
                    for (let i=0;i<cnt;i++) { const b=document.createElement('div'); b.className='balloon'; b.style.background=cs[i%cs.length]; b.textContent='🎈'; grid.appendChild(b); }
                    const opts = new Set([cnt]); while(opts.size<5) opts.add(_rand(Math.max(1,cnt-3),cnt+3));
                    const div = document.getElementById('itChoices');
                    [...opts].sort(()=>Math.random()-0.5).forEach(n => { const b=document.createElement('button'); b.className='choice-btn'; b.innerHTML=`<span class="num">${n}</span>`; b.onclick=()=>Game._judge(b,n===cnt); div.appendChild(b); });
                }, ans:cnt,
            }));
        },
        comparing(n) {
            const ps = []; for (let i=0;i<n;i++) { let l=_rand(2,8),r=_rand(2,8); while(r===l)r=_rand(2,8); const askFewer = i===1; ps.push({l,r,more:l>r?'left':'right',askFewer}); }
            return ps.map(p => {
                const correct = p.askFewer ? (p.more==='left'?'right':'left') : p.more;
                return {
                    type:'compare', voice:p.askFewer?'q_compare_fewer':'q_compare', q:p.askFewer?'⚖️ 哪边更少？点点少的那边':'⚖️ 哪边更多？点点多的那边',
                    correct: correct,
                    render(area) {
                        area.innerHTML = `<div style="display:flex;flex-direction:row;gap:16px;justify-content:center;align-items:flex-start;"><div class="click-group" data-correct="${correct==='left'}" id="gL"><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-width:60px;" id="lGrid"></div><span class="hint">👈 左边</span></div><div style="font-size:36px;color:#ddd;align-self:center;">VS</div><div class="click-group" data-correct="${correct==='right'}" id="gR"><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-width:60px;" id="rGrid"></div><span class="hint">👉 右边</span></div></div>`;
                        ['lGrid','rGrid'].forEach((id,i)=>{ const g=document.getElementById(id); const cnt=i===0?p.l:p.r; for(let j=0;j<cnt;j++){const s=document.createElement('span');s.style.fontSize='28px';s.style.margin='2px';s.textContent=['⭐','🌟','✨'][j%3];g.appendChild(s);}});
                        document.getElementById('gL').onclick=()=>Game._judgeDirect('gL',correct==='left');
                        document.getElementById('gR').onclick=()=>Game._judgeDirect('gR',correct==='right');
                    }, ans:correct,
                };
            });
        },
        length(n) {
            const ps = []; for(let i=0;i<n;i++){let t=_rand(30,80),b=_rand(30,80);while(Math.abs(t-b)<10){t=_rand(30,80);b=_rand(30,80);}ps.push({t,b,longer:t>b?'top':'bottom',askLonger:Math.random()>0.5});}
            return ps.map(p => {
                // 问短 → 正确答案是反的（提前算好，不在 render 里算）
                const target = p.askLonger ? (p.longer==='top'?'top':'bottom') : (p.longer==='top'?'bottom':'top');
                return {
                    type:'length', voice:p.askLonger?'q_len_long':'q_len_short', q:p.askLonger?'📏 哪条更长？点一点':'📏 哪条更短？点一点',
                    ans:target, longer:p.longer,
                    render(area) {
                        area.innerHTML = `<div style="display:flex;flex-direction:column;gap:16px;align-items:center;width:100%;padding:8px 0;"><div class="click-group" data-correct="${target==='top'}" id="gT" style="width:90%;"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:18px;">👆</span><div style="height:32px;border-radius:16px;background:linear-gradient(90deg,#87ceeb,#5ba3d9);width:${p.t}%;"></div></div><span class="hint">点这条 👆</span></div><div class="click-group" data-correct="${target==='bottom'}" id="gB" style="width:90%;"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:18px;">👇</span><div style="height:32px;border-radius:16px;background:linear-gradient(90deg,#ffb6c1,#ff7e9f);width:${p.b}%;"></div></div><span class="hint">点这条 👇</span></div></div>`;
                        document.getElementById('gT').onclick=()=>Game._judgeDirect('gT',target==='top');
                        document.getElementById('gB').onclick=()=>Game._judgeDirect('gB',target==='bottom');
                    },
                };
            });
        },
        sorting(n) {
            const qs = [{items:['🍎','🍎','🍎','🍊'],ok:3},{items:['🐱','🐱','🐶','🐱'],ok:2},{items:['🔴','🔴','🟡','🔴'],ok:2},{items:['⬛','⬛','⬛','🟠'],ok:3},{items:['🚗','🚗','🚲','🚗'],ok:2},{items:['🌸','🌸','🌻','🌸'],ok:2}].sort(()=>Math.random()-0.5).slice(0,n);
            return qs.map(q => ({
                type:'sort', voice:'q_sort', q:'📦 找出不一样的那个', items:q.items,
                render(area) {
                    area.innerHTML = `<div class="sort-grid" id="soGrid"></div>`;
                    const g=document.getElementById('soGrid');
                    q.items.forEach((it,i)=>{const c=document.createElement('div');c.className='sort-card';c.textContent=it;c.dataset.idx=i;c.onclick=()=>Game._judge(c,i===q.ok);g.appendChild(c);});
                }, ans:q.ok,
            }));
        },
        position(n) {
            // 找位置：哪个在上面/下面/左边/右边？正确选项放在对应位置，直接看图判断
            const qs = [
                // 竖排（上/下）：第一个在视觉上方，第二个在下方
                {pos:'top',    top:'🐤', bottom:'🐟', q:'哪个在上面呀？', voice:'q_pos', name:'小鸟'},
                {pos:'bottom', top:'🐟', bottom:'🐤', q:'哪个在下面呀？', voice:'q_pos_bottom', name:'小鸟'},
                // 横排（左/右）：第一个在视觉左边，第二个在右边
                {pos:'left',   left:'🐱', right:'🐶', q:'哪个在左边呀？', voice:'q_pos2', name:'小猫'},
                {pos:'right',  left:'🐱', right:'🐶', q:'哪个在右边呀？', voice:'q_pos_right', name:'小狗'},
            ].sort(()=>Math.random()-0.5).slice(0,n);
            return qs.map(q => ({
                type:'pos', voice:q.voice, q:q.q, name:q.name,
                render(area) {
                    const isVert = q.pos==='top'||q.pos==='bottom';
                    if (isVert) {
                        area.innerHTML = `<div style="display:flex;flex-direction:column;gap:20px;align-items:center;padding:12px;"><div class="click-group" data-correct="${q.pos==='top'}" id="gA"><div style="font-size:64px;">${q.top}</div></div><div class="click-group" data-correct="${q.pos==='bottom'}" id="gB"><div style="font-size:64px;">${q.bottom}</div></div></div>`;
                    } else {
                        area.innerHTML = `<div style="display:flex;gap:24px;justify-content:center;align-items:center;padding:12px;"><div class="click-group" data-correct="${q.pos==='left'}" id="gA"><div style="font-size:64px;">${q.left}</div></div><div class="click-group" data-correct="${q.pos==='right'}" id="gB"><div style="font-size:64px;">${q.right}</div></div></div>`;
                    }
                    document.getElementById('gA').onclick=()=>Game._judgeDirect('gA', (isVert?q.pos==='top':q.pos==='left'));
                    document.getElementById('gB').onclick=()=>Game._judgeDirect('gB', (isVert?q.pos==='bottom':q.pos==='right'));
                }, ans:q.pos,
            }));
        },
    },

    // ========== 渲染当前关卡 ==========
    _render() {
        const rd = this.rounds[this.curIdx];
        if (!rd) { this._finish(); return; }
        Voice.stopAll(); // 上一关残留语音全停
        this._jumping = false;
        this.answered = false;
        document.getElementById('btnNext').style.display = 'none';
        const fb = document.getElementById('feedback'); fb.textContent = ''; fb.className = 'feedback-text';
        const pct = (this.curIdx / this.TOTAL) * 100;
        document.getElementById('pgFill').style.width = pct + '%';
        document.getElementById('pgText').textContent = `第 ${this.curIdx+1} 关 / 共 ${this.TOTAL} 关`;
        this._mascot('normal');
        document.getElementById('questionLabel').textContent = rd.q;
        rd.render(document.getElementById('playArea'));
        // 桃子音MP3读题
        if (rd.voice) { Voice.play(rd.voice); } else { setTimeout(() => Voice.speak(rd.q), 400); }
    },

    // ========== 答题判定（choice-btn / sort-card） ==========
    _judge(el, ok) {
        if (this.answered) return;
        this.answered = true;
        this._clearTimer();
        _disableAll('.choice-btn,.sort-card,.click-group');

        const fb = document.getElementById('feedback');
        const rd = this.rounds[this.curIdx];
        // 构造正确答案的语音文本
        const ansText = el.classList.contains('choice-btn')
            ? String(rd.ans)
            : (el.classList.contains('sort-card') ? (_emojiSay(rd.items[rd.ans])||'') : '');

        if (ok) {
            SFX.right();
            el.classList.add('ok');
            this.score++;
            fb.className = 'feedback-text ok';
            this._mascot('happy');
            const pa = document.getElementById('playArea');
            pa.style.background = '#f0fff4';
            setTimeout(() => { pa.style.background = ''; }, 600);
            Voice.praise((txt) => {
                fb.textContent = txt;
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 2000);
            });
        } else {
            SFX.wrong();
            el.classList.add('err');
            this._highlightCorrect(rd, el);
            fb.textContent = `正确答案是 ${ansText}，没关系哦~`;
            fb.className = 'feedback-text err';
            this._mascot('confused');
            Voice.correctHint(ansText, () => {
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 3000);
            });
        }
        this._showBtn();
    },

    // ========== 直接点击判定（click-group） ==========
    _judgeDirect(elId, ok) {
        if (this.answered) return;
        this.answered = true;
        this._clearTimer();
        _disableAll('.choice-btn,.sort-card,.click-group');

        const el = document.getElementById(elId);
        const fb = document.getElementById('feedback');

        if (ok) {
            SFX.right();
            el.classList.add('bounce');
            this.score++;
            fb.className = 'feedback-text ok';
            this._mascot('happy');
            const pa = document.getElementById('playArea');
            pa.style.background = '#f0fff4';
            setTimeout(() => { pa.style.background = ''; }, 600);
            Voice.praise((txt) => {
                fb.textContent = txt;
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 2000);
            });
        } else {
            SFX.wrong();
            el.classList.add('shake');
            document.querySelectorAll('.click-group').forEach(g => {
                if (g.dataset.correct === 'true') g.classList.add('highlight');
            });
            fb.textContent = '再看一下正确答案哦~';
            fb.className = 'feedback-text err';
            this._mascot('confused');
            const rd = this.rounds[this.curIdx];
            let hint = '';
            if (rd.type === 'compare') hint = rd.correct === 'left' ? '左边' : '右边';
            else if (rd.type === 'length') hint = rd.ans === 'top' ? '上面那条' : '下面那条';
            else if (rd.type === 'pos') hint = rd.name || '';
            Voice.correctHint(hint || '这一个', () => {
                if (this._jumping) return;
                this._timer = setTimeout(() => this.next(), 3000);
            });
        }
        this._showBtn();
    },

    // 高亮正确答案
    _highlightCorrect(rd, el) {
        if (el.classList.contains('choice-btn')) {
            document.querySelectorAll('.choice-btn').forEach(b => {
                if (parseInt(b.querySelector('.num')?.textContent) === rd.ans) b.classList.add('ok');
            });
        } else if (el.classList.contains('sort-card')) {
            document.querySelectorAll('.sort-card').forEach(c => {
                if (parseInt(c.dataset.idx) === rd.ans) c.classList.add('ok');
            });
        }
    },

    _showBtn() {
        const btn = document.getElementById('btnNext');
        btn.style.display = 'inline-block';
        btn.textContent = this.curIdx >= this.TOTAL - 1 ? '看结果 🎉' : '下一关 ➡️';
    },
    _clearTimer() {
        if (this._timer) { clearTimeout(this._timer); this._timer = null; }
    },

    // ========== 下一关 ==========
    next() {
        this._jumping = true;  // 阻止残留的语音回调
        this._clearTimer();
        this.curIdx++;
        if (this.curIdx >= this.TOTAL) { this._finish(); return; }
        this._render();
    },

    // ========== 结束 ==========
    _finish() {
        _show('scResult');
        const pct = Math.round((this.score / this.TOTAL) * 100);
        document.getElementById('resultScore').textContent = `${this.score} / ${this.TOTAL}`;

        let msg, stars;
        if (pct === 100)      { msg='满分通关！你是最棒的数学小天才！🎊🎊🎊 小企鹅为你疯狂鼓掌！'; stars=3; SFX.fanfare(); this._confetti(); }
        else if (pct >= 70)   { msg='太厉害啦！你闯过了大部分关卡，再玩一次就能拿满分咯💪'; stars=3; SFX.fanfare(); }
        else if (pct >= 40)   { msg='不错哦！你学会了好多本领，再来一次会更好！😊'; stars=2; }
        else                  { msg='没关系，小企鹅陪你多练几次，下次一定更棒！🧸'; stars=1; }
        document.getElementById('resultMsg').textContent = msg;

        const sc = document.getElementById('resultStars');
        sc.innerHTML = '';
        for (let i=0;i<3;i++) {
            const s = document.createElement('span');
            s.className = 'result-star';
            s.textContent = i < stars ? '⭐' : '☆';
            s.style.animationDelay = (i*0.15)+'s';
            if (i>=stars) s.style.opacity = '0.3';
            sc.appendChild(s);
        }

        Voice.resultSpeak(pct);
    },

    // ========== 纸屑 ==========
    _confetti() {
        const box = document.createElement('div');
        box.className = 'confetti-box'; document.body.appendChild(box);
        const cs = ['#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#ff9500','#a29bfe','#fd79a8'];
        for (let i=0;i<60;i++) {
            const p = document.createElement('div');
            p.className = 'confetti-piece';
            p.style.left = Math.random()*100+'%'; p.style.top = '-10px';
            p.style.background = cs[i%cs.length];
            p.style.width = (Math.random()*6+4)+'px';
            p.style.height = (Math.random()*6+4)+'px';
            p.style.animationDuration = (Math.random()*2+2)+'s';
            p.style.animationDelay = (Math.random()*1.5)+'s';
            box.appendChild(p);
        }
        setTimeout(()=>box.remove(), 6000);
    },

    // ========== 萌宠表情 ==========
    _mascot(mood) {
        const el = document.getElementById('mascotAv');
        if (!el) return;
        const map = {
            normal:   'mascot-penguin',
            happy:    'mascot-penguin-happy',
            confused: 'mascot-penguin-confused',
        };
        el.className = 'mascot-avatar ' + (map[mood] || map.normal);
    },
};

/* ================================================================
   模块 3：工具函数
   ================================================================ */
function _show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function _emojiSay(emoji) { const m={'🍎':'苹果','🍊':'橘子','🐱':'小猫','🐶':'小狗','🔴':'红色','🟡':'黄色','⬛':'黑色','🟠':'橘色','🚗':'汽车','🚲':'自行车','🌸':'小花','🌻':'向日葵'}; return m[emoji]||''; }
function _rand(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
function _pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function _disableAll(sel) {
    document.querySelectorAll(sel).forEach(e => e.classList.add('disabled'));
}

/* ================================================================
   启动
   ================================================================ */
window.onload = () => {
    document.documentElement.setAttribute('data-sign', 'MathGame_AmusementPark_20260614');
    Voice.init();
    // 预加载图片
    ['游戏人物角色/企鹅_数数.png','游戏互动表情/企鹅_开心.png','游戏互动表情/企鹅_疑惑.png'].forEach(u => {
        const img = new Image(); img.src = u;
    });
};
